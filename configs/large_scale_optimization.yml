project:
  raw_data_dir: data/raw_data
  data_mining_tables_dir: results/data_mining/tables
  output_dir: results/large_scale_optimization

calibration:
  cities:
    - New York
    - Chicago
    - Houston
    - Philadelphia
    - San Antonio
    - Dallas
    - Austin
  unit_selection:
    method: all
  unit_count: 35
  horizon_steps: 12
  delta_t_hours: 1.0
  fallback_speed_deficit: 0.06
  vulnerability_blend: 0.55
  rainfall_shock_scale: 0.45
  min_recovery_tau_hours: 6.0
  max_recovery_tau_hours: 24.0
  default_recovery_tau_hours: 12.0
  dependence_self_loop_floor: 0.05

interventions:
  delta_C: 0.35
  delta_S: 0.55
  eta:
    R: 0.18
    C: 0.28
    S: 0.35
  cost:
    R: 1.25
    C: 0.85
    S: 0.65
  max_effective_deployment_fraction:
    R: 0.18
    C: 0.12
    S: 0.07
  pwl_diminishing_returns:
    enabled: true
    segment_cap_shares: [0.35, 0.35, 0.30]
    effectiveness_multipliers:
      R: [1.00, 0.70, 0.42]
      C: [1.00, 0.62, 0.34]
      S: [1.00, 0.55, 0.28]
  delays:
    R: 2
    C: 0
    S: 1
  budget_intensity: 0.18
  period_budget_share: 0.28
  total_budget_multiplier: 1.25

scenarios:
  - name: base
    budget_intensity: 0.18
    delays:
      R: 2
      C: 0
      S: 1

solver:
  output_flag: false
  method: -1
  time_limit_seconds: 300

outputs:
  save_calibrated_params: false
  save_trajectories: false
  save_interventions: false
  evaluate_policies: true
  save_policy_trajectories: false
